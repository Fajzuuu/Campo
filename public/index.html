<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAMPO - Booking Lapangan Olahraga</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Navbar */
        .navbar-custom {
            background-color: #82c4f5;
            padding: 0.5rem 0;
        }
        .navbar-custom .navbar-brand img {
            width: 120px;
            height: 60px;
        }
        .nav-link, .navbar-brand {
            color: #333 !important;
            font-weight: bold;
        }
        .nav-link.active {
            color: #000 !important;
        }

        /* Banner Utama */
        .hero-section {
            /* Placeholder gambar banner */
            background: url('banner.png') no-repeat center center;
            background-size: cover;
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }
        
        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.3);
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 4px 4px 5px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .hero-subtitle {
            font-size: 1.5rem;
            color: #fff;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* Form Pencarian */
        .search-section {
            /* Placeholder gambar basket */
            background: url('https://images.unsplash.com/photo-1546519638-68e109498ffc?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center;
            background-size: cover;
            padding: 60px 0;
            position: relative;
        }
        
        .search-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, #0d6efd 10%, rgba(13, 110, 253, 0.4) 100%);
        }

        .search-content {
            position: relative;
            z-index: 2;
        }

        .btn-temukan {
            background-color: #0b1a30; 
            color: #fff;
            font-weight: bold;
            width: 100%;
            padding: 10px;
        }
        .btn-temukan:hover {
            background-color: #163057;
            color: #fff;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="logo campo.png" alt="Logo Campo" class="me-2">
                campo
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item"><a class="nav-link active" href="#">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link" href="venue.html">Venue</a></li>
                    <li class="nav-item"><a class="nav-link" href="masuk.html">Masuk</a></li>
                    <li class="nav-item"><a class="nav-link" href="daftar.html">Daftar</a></li>
                    <li class="nav-item ms-3 text-center">
                        <img src="https://ui-avatars.com/api/?name=Mawar&background=fff&color=000&rounded=true" alt="Mawar" width="35" height="35" class="rounded-circle">
                        <div style="font-size: 0.8rem; font-weight: bold; margin-top: 2px;">Mawar</div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero-section">
        <div class="hero-overlay"></div>
        <div class="container hero-content">
            <h1 class="hero-title"></h1>
            <p class="hero-subtitle"><br></p>
        </div>
    </section>

    <section class="search-section">
        <div class="search-overlay"></div>
        <div class="container search-content text-white text-center">
            <h2 class="mb-4 fw-bold">Pilih lapangan mu sekarang</h2>
            
            <form action="#" method="POST" class="row justify-content-center g-3">
                <div class="col-md-3">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0">❯</span>
                        <select class="form-select border-start-0 ps-0" name="jenis_olahraga" required>
                            <option value="" selected disabled>pilih olahraga</option>
                            <option value="bulutangkis">Bulutangkis</option>
                            <option value="futsal">Futsal</option>
                        </select>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0">❯</span>
                        <input type="date" class="form-control border-start-0 ps-0" name="tanggal_main" required placeholder="pilih tanggal">
                    </div>
                </div>

                <div class="col-md-2">
                    <button type="submit" class="btn btn-temukan rounded-3">Temukan</button>
                </div>
            </form>
            
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
