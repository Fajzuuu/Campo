<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - CAMPO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        /* Navbar */
        .navbar-custom {
            background-color: #82c4f5;
            padding: 0.5rem 0;
        }
        .navbar-custom .navbar-brand img {
            width: 120px;
            height: 60px;
        }
        .nav-link, .navbar-brand {
            color: #333 !important;
            font-weight: bold;
        }
        .nav-link.active {
            color: #000 !important;
        }

        /* Tata Letak Halaman Login */
        .login-wrapper {
            min-height: calc(100vh - 76px); 
            display: flex;
            flex-wrap: wrap;
        }
        .login-form-section {
            flex: 1 1 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 5% 10%;
            background-color: #f8f9fa; 
        }
        .login-image-section {
            flex: 1 1 50%;
            background: url('https://images.unsplash.com/photo-1626245027680-80ae0d0f7207?auto=format&fit=crop&w=1000&q=80') no-repeat center center;
            background-size: cover;
        }

        @media (max-width: 768px) {
            .login-image-section { display: none; }
            .login-form-section { flex: 1 1 100%; padding: 10% 5%; }
        }

        /* Tipografi Form */
        .login-title {
            font-size: 2.2rem;
            font-weight: 900;
            color: #0b1a30;
            text-align: center;
            margin-bottom: 1rem;
        }
        .login-subtitle {
            text-align: center;
            color: #4a5568;
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }

        /* Garis pemisah */
        .divider-text {
            display: flex;
            align-items: center;
            text-align: center;
            color: #718096;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }
        .divider-text::before, .divider-text::after {
            content: ''; flex: 1; border-bottom: 1px solid #cbd5e0;
        }
        .divider-text:not(:empty)::before { margin-right: 1em; }
        .divider-text:not(:empty)::after { margin-left: 1em; }

        /* Elemen Input */
        .form-control {
            padding: 0.8rem 1rem;
            border-color: #a0aec0;
            border-radius: 4px;
        }
        /* Penyesuaian margin agar seragam */
        .input-group, .form-control.email-input {
            margin-bottom: 1rem;
        }
        
       /* Tombol icon mata */
.btn-eye {
    border: 1px solid #a0aec0; /* Tegaskan ukuran dan gaya border */
    background-color: white;
    color: #718096;
}

/* Pastikan style tidak berubah saat di-hover, di-klik (active), atau di-focus */
.btn-eye:hover, 
.btn-eye:active, 
.btn-eye:focus {
    background-color: #f8f9fa !important;
    border-color: #a0aec0 !important; /* Paksa warna border tetap sama */
    color: #718096 !important;
    box-shadow: none !important; /* Hilangkan efek glow biru bawaan tombol agar seragam */
    z-index: 1; /* Mencegah border tertimpa oleh elemen di sebelahnya */
}

        /* Elemen Bawah */
        .forgot-password {
            text-align: center;
            font-size: 0.95rem;
            color: #718096;
            margin-bottom: 1.5rem;
        }
        .forgot-password a {
            color: #0b1a30; font-weight: bold; text-decoration: underline;
        }

        .btn-login {
            background-color: #70bdeb; 
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 0.8rem;
            border-radius: 8px;
            border: none;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-login:hover { background-color: #5baae0; color: white; }

        .register-link {
            text-align: center; font-size: 0.95rem; margin-top: 1.5rem;
            color: #718096; padding-bottom: 1.5rem; border-bottom: 1px solid #cbd5e0; 
        }
        .register-link a { color: #0b1a30; font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="logo campo.png" alt="Logo Campo" class="me-2" onerror="this.src='https://ui-avatars.com/api/?name=C&background=random&color=fff&rounded=true'; this.style.width='40px'; this.style.height='40px';">
                campo
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link" href="venue.html">Venue</a></li>
                    <li class="nav-item"><a class="nav-link active" href="masuk.html">Masuk</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Daftar</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid p-0">
        <div class="login-wrapper">
            <div class="login-form-section">
                <div style="max-width: 450px; margin: 0 auto; width: 100%;">
                    <h1 class="login-title">Selamat Datang.</h1>
                    <p class="login-subtitle">Ribuan orang telah merasakan<br>pengalaman seru berolahraga bersama<br>kami. Sekarang giliran kamu!</p>
                    
                    <div class="divider-text">Login menggunakan Akun</div>
                    
                    <form action="#" method="POST">
                        <input type="email" class="form-control email-input" name="email" placeholder="Email" required>
                        
                        <div class="input-group">
                            <input type="password" class="form-control border-end-0" name="password" id="passwordField" placeholder="Password" required>
                            <button class="btn btn-eye border-start-0" type="button" id="togglePassword">
                                <i class="bi bi-eye-slash" id="eyeIcon"></i>
                            </button>
                        </div>
                        
                        <div class="forgot-password">
                            Lupa Password? <a href="#">Klik Disini</a>
                        </div>
                        
                        <button type="submit" class="btn btn-login">Login</button>
                        
                        <div class="register-link">
                            Belum Memiliki Akun? Yuk Daftar <a href="#">Disini</a>
                        </div>
                    </form>
                </div>
            </div>
            <!-- foto samping tulisan login -->
            <div class="login-image-sectios"><img src="https://i.pinimg.com/736x/45/b0/e0/45b0e05edc2b378d1522fd57a63f1fb6.jpg" alt=""></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordField = document.getElementById('passwordField');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePassword.addEventListener('click', function () {
            // Cek tipe input saat ini, lalu ubah
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            
            // Ubah icon mata dicoret (eye-slash) menjadi mata terbuka (eye)
            eyeIcon.classList.toggle('bi-eye');
            eyeIcon.classList.toggle('bi-eye-slash');
        });
    </script>
</body>
</html>
